name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: reservia

jobs:
  # ────────────────────────────────────────────────────────────────
  lint:
    name: Lint & TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: reservia/package-lock.json

      - name: Installer les dépendances
        run: npm ci

      - name: Générer le client Prisma
        run: npx prisma generate

      - name: Vérification TypeScript
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

  # ────────────────────────────────────────────────────────────────
  test:
    name: Tests unitaires & intégration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: reservia/package-lock.json

      - name: Installer les dépendances
        run: npm ci

      - name: Générer le client Prisma
        run: npx prisma generate

      - name: Lancer Vitest
        run: npm test

  # ────────────────────────────────────────────────────────────────
  e2e:
    name: Tests E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [test]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: reservia
          POSTGRES_PASSWORD: reservia
          POSTGRES_DB: reservia_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://reservia:reservia@localhost:5432/reservia_test
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci-secret-for-tests-only

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: reservia/package-lock.json

      - name: Installer les dépendances
        run: npm ci

      - name: Installer les navigateurs Playwright
        run: npx playwright install chromium --with-deps

      - name: Appliquer les migrations Prisma
        run: npx prisma migrate deploy

      - name: Générer le client Prisma
        run: npx prisma generate

      - name: Peupler la BDD (seed)
        run: npm run db:seed

      - name: Lancer les tests E2E
        run: npm run test:e2e

      - name: Upload rapport Playwright (si échec)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: reservia/playwright-report/
          retention-days: 7
