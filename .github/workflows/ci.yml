name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: reservia

jobs:
  # ────────────────────────────────────────────────────────────────
  lint:
    name: Lint & TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: reservia/package-lock.json

      - name: Installer les dépendances
        run: npm ci

      - name: Générer le client Prisma
        run: npx prisma generate

      - name: Vérification TypeScript
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

  # ────────────────────────────────────────────────────────────────
  test:
    name: Tests unitaires & intégration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: reservia/package-lock.json

      - name: Installer les dépendances
        run: npm ci

      - name: Générer le client Prisma
        run: npx prisma generate

      - name: Lancer Vitest
        run: npm test

